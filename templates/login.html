<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h2>Login</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Enter Username" required>
        <input type="password" name="password" placeholder="Enter Password" required>
        <button type="submit">Login</button>
    </form>
    <div class="Registration-link"><p>Don't have an account?</p><a href="/register"class="btn-secondary">Register here</a></div>
    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}
    {% if session.get('is_admin')%}
    <a href="/records">View All Student Records</a>
    {% endif %}
</div>

</body>
</html>
