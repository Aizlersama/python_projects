<!DOCTYPE html>
<html>
<head>
<title>Student Records</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
<h2>All Student Records</h2>

<table>
<tr>
<th>Reg No</th>
<th>Name</th>
<th>Dept</th>
<th>CGPA</th>
<th>Result</th>
</tr>

{% for row in students %}
<tr>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>
<td>{{ row[4] }}</td>
<td>{{ row[5] }}</td>
</tr>
{% endfor %}

</table>

<br>
<a href="/"><button>Back</button></a>

</div>
</body>
</html>
